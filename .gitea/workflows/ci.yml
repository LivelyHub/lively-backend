name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check migrations are up to date
        # generate only diffs schema files, it never connects — placeholder URL
        # satisfies drizzle.config.ts. If it emits a new migration, the schema
        # changed without `npm run db:generate` being committed.
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
        run: |
          npm run db:generate
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "Schema changed but no migration committed. Run npm run db:generate."
            git status --porcelain drizzle
            exit 1
          fi

  deploy:
    if: gitea.ref == 'refs/heads/main' && gitea.event_name == 'push'
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build --target build -t lively-backend:migrate .
          docker build -t lively-backend:${{ gitea.sha }} -t lively-backend:latest .

      - name: Write .env from APP_ENV secret
        # quoted heredoc: secret is inserted literally, no shell expansion
        run: |
          umask 077
          cat > .env <<'APP_ENV_EOF'
          ${{ secrets.APP_ENV }}
          APP_ENV_EOF
          # strip CR so a secret pasted with Windows line endings doesn't
          # leave \r inside values (docker --env-file keeps it verbatim)
          sed -i 's/\r$//' .env

      - name: Run migrations
        run: |
          docker run --rm --env-file .env \
            lively-backend:migrate npm run db:migrate

      - name: Restart container
        # -e PORT wins over --env-file, so the app always matches the -p mapping
        run: |
          docker rm -f lively-backend 2>/dev/null || true
          docker run -d --name lively-backend --restart unless-stopped \
            -p 7000:7000 \
            --env-file .env \
            -e PORT=7000 \
            lively-backend:latest

      - name: Health check
        # exec inside the container so this works even when the runner
        # itself runs jobs in Docker (host localhost isn't reachable there)
        run: |
          sleep 3
          docker exec lively-backend node -e \
            "fetch('http://localhost:7000/health').then(r => { if (!r.ok) process.exit(1); return r.text(); }).then(console.log).catch(() => process.exit(1))"

      - name: Prune old images
        run: docker image prune -f

      - name: Remove .env from workspace
        if: always()
        run: rm -f .env
